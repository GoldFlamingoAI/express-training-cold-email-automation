name: Codex Guard

# Stack-agnostic CI checks for the Codex + Claude Code review workflow.
# These checks enforce the workflow contract regardless of language.
# Add stack-specific lint/test steps in the marked block at the bottom.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Enforce Codex contract
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 50 commits is enough for the commit-message check on any realistic PR;
          # avoids the bandwidth cost of fetch-depth: 0 (full history).
          fetch-depth: 50

      # The next three checks enforce the Codex micro-task contract.
      # They only apply to PRs from codex/* branches. PRs from Claude
      # (claude/*), the repo owner, or any other branch are skipped —
      # they don't follow the per-task PR model.

      - name: Verify PR title has [TASK_X.X] tag
        if: startsWith(github.head_ref, 'codex/')
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '\[TASK_[0-9]+\.[0-9]+[a-z]?\]$'; then
            echo "::error::PR title must end with [TASK_X.X] tag. Got: $PR_TITLE"
            exit 1
          fi

      - name: Verify every commit message has [TASK_X.X] tag
        if: startsWith(github.head_ref, 'codex/')
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MISSING=$(git log --format=%s "$BASE_SHA..$HEAD_SHA" | grep -vE '\[TASK_[0-9]+\.[0-9]+[a-z]?\]$' || true)
          if [ -n "$MISSING" ]; then
            echo "::error::Commits missing [TASK_X.X] tag:"
            echo "$MISSING"
            exit 1
          fi

      - name: Verify PHASES.md updated in this PR
        if: startsWith(github.head_ref, 'codex/')
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if ! git diff --name-only "$BASE_SHA..$HEAD_SHA" | grep -q '^PHASES\.md$'; then
            echo "::error::PHASES.md not updated. Rule 4: every task PR must mark the task complete by flipping one checkbox."
            exit 1
          fi

      - name: Verify PHASES.md has no conflict markers or duplicate tasks
        run: |
          if grep -nE '^(<{7}|={7}|>{7})' PHASES.md; then
            echo "::error file=PHASES.md::Unresolved merge conflict markers in PHASES.md. Never 'accept both' — take main and re-apply only your one checkbox flip."
            exit 1
          fi
          DUPES=$(grep -oE '\*\*Task [0-9]+\.[0-9]+[a-z]?\*\*' PHASES.md | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "::error file=PHASES.md::Duplicate task lines in PHASES.md (bad conflict resolution). Each task must appear exactly once:"
            echo "$DUPES"
            exit 1
          fi

      - name: Verify no .github/workflows changes from non-owners
        env:
          # author_association is one of: OWNER, MEMBER, COLLABORATOR,
          # CONTRIBUTOR, FIRST_TIME_CONTRIBUTOR, FIRST_TIMER, NONE.
          # Allow only the first three. Works for both personal and org repos.
          PR_AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA..$HEAD_SHA" | grep '^\.github/workflows/' || true)
          if [ -z "$CHANGED" ]; then
            exit 0
          fi
          case "$PR_AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Workflow change allowed for $PR_AUTHOR ($PR_AUTHOR_ASSOC)."
              ;;
            *)
              echo "::error::.github/workflows/ may only be modified by repo owners, members, or collaborators. PR author $PR_AUTHOR has association: $PR_AUTHOR_ASSOC."
              echo "$CHANGED"
              exit 1
              ;;
          esac

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      # ── Apps Script syntax gate ──────────────────────────────────────────
      # Apps Script (V8) parses as standard JS, so a syntax error means the
      # whole project fails to load in the editor. node --check catches it
      # here — copy each .gs to a .js temp so node treats it as a script and
      # parses (no execution, so undefined globals like SpreadsheetApp are fine).
      - name: Verify all .gs files parse
        run: |
          FAILED=0
          for f in $(find src -name '*.gs'); do
            cp "$f" "/tmp/$(basename "$f").js"
            if ! node --check "/tmp/$(basename "$f").js"; then
              echo "::error file=$f::$f has a syntax error and will not load in Apps Script"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      # ── Stack note — no local build step ─────────────────────────────────
      # This project is Google Apps Script (cloud-only, V8 engine). There is no
      # local build, install, or test stage: Codex writes .gs files to GitHub
      # and the human copies them into the Apps Script editor by hand. CI
      # enforces the Codex contract (task tags, PHASES.md, workflow ownership),
      # secret scanning, and a .gs syntax gate — nothing is compiled or run here.
      # ──────────────────────────────────────────────────────────────────────
