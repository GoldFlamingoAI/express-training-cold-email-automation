name: Codex Guard

# Automated guardrails only — no ceremony (no PR-title tags, no PHASES.md
# enforcement). Progress tracking lives in the PR list, not a shared file
# every branch edits. See docs/codex/OPERATING.md.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: Guardrails
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Verify branch is not forked from a stale base
        if: startsWith(github.head_ref, 'codex/')
        run: |
          # Safety net behind the environment's maintenance-script fix (see
          # docs/codex/OPERATING.md). A branch forked far behind main produces
          # conflicts that can revert merged work if resolved by hand.
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags --deepen=200 origin "$BASE_REF" 2>/dev/null || \
            git fetch --no-tags --unshallow origin 2>/dev/null || true
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
          if [ -z "$MERGE_BASE" ]; then
            echo "::warning::Could not compute merge-base (history too shallow). Skipping freshness check."
            exit 0
          fi
          BEHIND=$(git rev-list --count "$MERGE_BASE..$BASE_SHA")
          echo "Branch forked from a base that is $BEHIND commit(s) behind $BASE_REF."
          if [ "$BEHIND" -gt 15 ]; then
            echo "::error::Stale base: this branch forked $BEHIND commits behind $BASE_REF. The Codex environment's maintenance script should prevent this — check docs/codex/OPERATING.md. Do not resolve by hand; re-create the branch from fresh origin/$BASE_REF."
            exit 1
          fi

      - name: Verify no .github/workflows changes from non-owners
        env:
          PR_AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA..$HEAD_SHA" | grep '^\.github/workflows/' || true)
          if [ -z "$CHANGED" ]; then
            exit 0
          fi
          case "$PR_AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Workflow change allowed for $PR_AUTHOR ($PR_AUTHOR_ASSOC)."
              ;;
            *)
              echo "::error::.github/workflows/ may only be modified by repo owners, members, or collaborators. PR author $PR_AUTHOR has association: $PR_AUTHOR_ASSOC."
              echo "$CHANGED"
              exit 1
              ;;
          esac

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      # ── Apps Script syntax gate ──────────────────────────────────────────
      # A syntax error means the whole project fails to load in the Apps
      # Script editor. node --check catches it here — copy each .gs to a .js
      # temp so node treats it as a script and parses (no execution, so
      # undefined globals like SpreadsheetApp are fine).
      - name: Verify all .gs files parse
        run: |
          FAILED=0
          for f in $(find src manual-email-warmup-gmail/src -name '*.gs'); do
            cp "$f" "/tmp/$(basename "$f").js"
            if ! node --check "/tmp/$(basename "$f").js"; then
              echo "::error file=$f::$f has a syntax error and will not load in Apps Script"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
