# Aider config — <Project Name>
# Uses local Gemma via Ollama. No cloud API costs.

model: ollama/gemma4:31b

# Git
auto-commits: true
gitignore: true
stream: true
pretty: true

# Performance — skip unnecessary network calls and popups
check-update: false
analytics-disable: true
show-release-notes: false

# Context files Aider reads on every session start
read:
  - AIDER.md
  - PHASES.md
  - PLAYBOOK.md
